<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin - StudyPlanner</title><link rel="stylesheet" href="styles.css"></head><body><header class="top"><div class="wrap nav"><a class="logo" href="index.html"><span class="mark">SP</span>StudyPlanner</a><nav class="links"><a href="quiz.html">Mock Test</a><a href="index.html">Home</a></nav></div></header><main class="section wrap"><h2>Admin Control Panel</h2><p class="sub">Import, edit, validate, export, and publish quiz files to Firebase or Supabase.</p><div class="admin-grid"><section class="card"><h3>Quiz Details</h3><form id="meta" class="form"><input id="qid" value="sample-quiz"><input id="qtitle" value="SSC Foundation Mock"><textarea id="qdesc">Starter mock for StudyPlanner users.</textarea><input id="duration" type="number" value="10"><input id="pass" type="number" value="50"><select id="target"><option value="download">Download JSON</option><option value="firebase">Publish Firebase</option><option value="supabase">Publish Supabase</option></select></form></section><section class="card"><h3>JSON Editor</h3><input type="file" id="file" accept=".json,application/json"><textarea id="json" class="json"></textarea><p><button id="sample" class="btn alt">Load Sample</button> <button id="validate" class="btn">Validate</button> <button id="download" class="btn gold">Download</button> <button id="publish" class="btn red">Publish</button></p><pre id="log" class="log"></pre></section></div><section class="card"><h3>Add Question</h3><form id="qform" class="form"><textarea id="qt" placeholder="Question"></textarea><input id="o0" placeholder="Option A"><input id="o1" placeholder="Option B"><input id="o2" placeholder="Option C"><input id="o3" placeholder="Option D"><select id="ci"><option value="0">A</option><option value="1">B</option><option value="2">C</option><option value="3">D</option></select><textarea id="exp" placeholder="Explanation"></textarea><button class="btn">Add Question</button></form><div id="list"></div></section></main><script type="module" src="admin.js"></script></body></html>
